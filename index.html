<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Orthodoxie</title>

<style>

/* FOND */
body{
margin:0;
font-family:Arial;
background:url("montgeron.jpg") center/cover fixed;
color:white;
}

/* HEADER */
header{
background:linear-gradient(90deg, black, red, gold);
padding:15px;
display:flex;
align-items:center;
position:sticky;
top:0;
}

/* BURGER */
.menu-btn{
font-size:30px;
cursor:pointer;
}

/* MENU */
#menu{
position:fixed;
top:0;
right:-280px;
width:280px;
height:100%;
background:black;
transition:0.4s;
z-index:999;
}

#menu a{
display:block;
padding:15px;
color:white;
text-decoration:none;
cursor:pointer;
}

#menu a:hover{
background:gold;
color:black;
}

/* SLIDER CINÉMA */
.slider{
position:relative;
height:60vh;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1.5s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.active{
opacity:1;
transform:scale(1.1);
}

/* SECTION */
section{
background:rgba(0,0,0,0.7);
margin:20px;
padding:20px;
border-radius:10px;
}

/* IMAGE */
img{
width:100%;
border-radius:10px;
}

/* CALENDRIER */
#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
